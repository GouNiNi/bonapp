services:
  # Nginx: Sert les fichiers compilés (dist)
  bonapp:
    image: nginx:alpine
    container_name: bonapp
    volumes:
      # On monte le dossier dist généré par le builder
      - ./dist:/usr/share/nginx/html
      # On monte la config Nginx personnalisée pour la PWA
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    # Debug: Teste la configuration avant de lancer
    command: sh -c "nginx -t && nginx -g 'daemon off;'"
    restart: always
    networks:
      - proxy
    labels:
      - traefik.enable=true
      - traefik.http.routers.bonapp.rule=Host(`${SUBDOMAIN}.${DOMAIN_NAME}`)
      - traefik.http.routers.bonapp.tls=true
      - traefik.http.routers.bonapp.entrypoints=websecure
      - traefik.http.routers.bonapp.tls.certresolver=letsencrypt
      - traefik.http.middlewares.bonapp.headers.SSLRedirect=true
      - traefik.http.middlewares.bonapp.headers.STSSeconds=315360000
      - traefik.http.middlewares.bonapp.headers.browserXSSFilter=true
      - traefik.http.middlewares.bonapp.headers.contentTypeNosniff=true
      - traefik.http.middlewares.bonapp.headers.forceSTSHeader=true
      - traefik.http.middlewares.bonapp.headers.SSLHost=${DOMAIN_NAME}
      - traefik.http.middlewares.bonapp.headers.STSIncludeSubdomains=true
      - traefik.http.middlewares.bonapp.headers.STSPreload=true
      - traefik.http.routers.bonapp.middlewares=bonapp@docker
      - traefik.http.services.bonapp.loadbalancer.server.port=80

networks:
  proxy:
    external: true
